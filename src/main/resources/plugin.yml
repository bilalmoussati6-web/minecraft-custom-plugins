name: firepickaxe
version: 1.0.0
main: com.example.soulitem.firepickaxePlugin
api-version: 1.21.1
author: Notch
description: >-
  REAL custom item plugin (NOT a texture pack). Registers the "fire_pickaxe"
  item server-side via PersistentDataContainer NBT tags. Without this plugin,
  the item is just a regular NETHERITE_PICKAXE. With the plugin, it becomes
  "fire_pickaxe" with all configured abilities, attributes and recipes.
commands:
  fire:
    description: Gives you the real fire_pickaxe custom item (registered by this plugin via PersistentDataContainer)
    usage: /fire [player]
    permission: firepickaxe.give
permissions:
  firepickaxe.give:
    description: Allows giving the custom item
    default: op
